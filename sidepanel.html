<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser Assistant</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <!-- Top Bar -->
  <div class="top-bar">
    <h1 class="title">Browser Assistant</h1>
    <button id="settings-btn" class="icon-btn" title="Settings">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="10" cy="10" r="3"/>
        <path d="M10 1.5v2M10 16.5v2M1.5 10h2M16.5 10h2M3.4 3.4l1.4 1.4M15.2 15.2l1.4 1.4M3.4 16.6l1.4-1.4M15.2 4.8l1.4-1.4"/>
      </svg>
    </button>
  </div>

  <!-- Settings Panel -->
  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-group">
      <label for="provider-select">Provider</label>
      <select id="provider-select">
        <option value="ollama">Ollama</option>
        <option value="lmstudio">LM Studio</option>
        <option value="openai">OpenAI</option>
        <option value="claude">Anthropic</option>
      </select>
    </div>
    <div class="settings-group">
      <label for="endpoint-input">Endpoint URL</label>
      <input type="text" id="endpoint-input" placeholder="http://localhost:11434">
    </div>
    <div class="settings-group api-key-group hidden">
      <label for="apikey-input">API Key</label>
      <input type="password" id="apikey-input" placeholder="sk-...">
    </div>
    <div class="settings-group">
      <label for="model-select">Model</label>
      <div class="model-row">
        <select id="model-select">
          <option value="">-- Select a model --</option>
        </select>
        <button id="refresh-models-btn" class="icon-btn" title="Refresh models">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M2 8a6 6 0 0 1 10.3-4.1M14 8a6 6 0 0 1-10.3 4.1"/>
            <path d="M12 1v3.5h-3.5M4 15v-3.5h3.5"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="settings-group">
      <label class="checkbox-label">
        <input type="checkbox" id="screenshot-toggle">
        <span>Include screenshot (requires vision model)</span>
      </label>
    </div>
    <div class="settings-group">
      <label for="system-prompt-input">System Prompt</label>
      <textarea id="system-prompt-input" rows="4" placeholder="You are a helpful assistant analyzing a web page..."></textarea>
      <span class="settings-hint">Variables: {title}, {url}, {description}, {content}</span>
    </div>
  </div>

  <!-- Main Content -->
  <div id="main-content">
    <!-- Status Banner -->
    <div id="status-banner" class="status-banner hidden"></div>

    <!-- Chat Area -->
    <div id="chat-area" class="chat-area"></div>

    <!-- Bottom Controls -->
    <div class="bottom-controls">
      <!-- Action Buttons -->
      <div class="action-buttons">
        <button id="summarize-btn" class="action-btn primary">Summarize Page</button>
        <button id="ask-btn" class="action-btn secondary">Ask about Page</button>
      </div>

      <!-- Input Area -->
      <div id="input-area" class="input-area hidden">
        <textarea id="user-input" placeholder="Ask a question about this page..." rows="1"></textarea>
        <button id="screenshot-send-btn" class="screenshot-send-btn" title="Send with new screenshot">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="3" width="14" height="11" rx="2"/>
            <circle cx="9" cy="8.5" r="2.5"/>
            <circle cx="13" cy="5.5" r="1"/>
          </svg>
        </button>
        <button id="send-btn" class="send-btn" title="Send">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor">
            <path d="M2.5 15.5l13-6.5-13-6.5v5l9 1.5-9 1.5z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
